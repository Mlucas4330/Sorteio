version: '3'

services:
  db:  
    container_name: postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    container_name: api
    build: ./server
    depends_on:
      - db
  client:
    container_name: client
    build: ./client
    depends_on:
      - api

volumes:
  postgres_data:
